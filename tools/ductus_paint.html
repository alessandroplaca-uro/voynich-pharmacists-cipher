<!DOCTYPE html>
<html lang="it">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ductus Paint v2.3</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:#111;
    display:flex; flex-direction:column; align-items:center;
    gap:10px; padding:16px;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    font-size:13px; color:#bbb; min-height:100vh;
  }
  h2 { color:#c9a96e; font-weight:300; font-size:15px; letter-spacing:3px; margin-top:4px; }
  canvas { cursor:crosshair; border:1px solid #1e1e1e; touch-action:none; display:block; max-width:100%; }
  .row { display:flex; gap:9px; flex-wrap:wrap; justify-content:center; }
  button {
    background:#1a1a1a; color:#888; border:1px solid #2a2a2a;
    padding:8px 18px; cursor:pointer; font-family:inherit; font-size:13px;
    border-radius:4px; transition:color .15s,border-color .15s;
  }
  button:hover { color:#eee; border-color:#555; }
  button.sm {
    padding:3px 9px; font-size:11px; color:#555; border-color:#222;
  }
  button.sm:hover { color:#bbb; border-color:#444; }
  #status {
    width:520px; max-width:100%;
    background:#0d0d0d; border:1px solid #222; border-radius:4px;
    padding:10px 14px; display:flex; align-items:center; gap:10px; min-height:44px;
  }
  .mdot {
    width:11px; height:11px; border-radius:50%; background:#2a2a2a; flex-shrink:0;
    transition:background .15s, box-shadow .15s;
  }
  .mdot.green  { background:#44cc44; box-shadow:0 0 8px #44cc44; }
  .mdot.red    { background:#ee3333; box-shadow:0 0 8px #ee3333; }
  .mdot.orange { background:#ff9800; box-shadow:0 0 8px #ff9800; }
  #status-txt { font-size:13px; flex:1; }

  /* Gallows ID box */
  #gid-box {
    width:520px; max-width:100%;
    background:#0a0a0a; border:1px solid #1d1d1d; border-radius:4px;
    padding:10px 14px; display:flex; align-items:flex-start; gap:14px; min-height:50px;
  }
  #gid-token {
    font-family:'Courier New',monospace; font-size:28px; font-weight:700;
    color:#2a2a2a; line-height:1; flex-shrink:0; min-width:28px; text-align:center;
    letter-spacing:-1px;
  }
  #gid-detail {
    font-size:12px; color:#444; line-height:1.6; flex:1;
  }
  #gid-label {
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#2a2a2a;
    flex-shrink:0; padding-top:6px;
  }

  .panels { display:flex; gap:9px; width:520px; max-width:100%; }
  .panel { flex:1; min-width:0; }
  .plabel-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:4px;
  }
  .plabel { color:#444; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }
  .out {
    background:#0a0a0a; border:1px solid #1a1a1a; padding:9px;
    font-family:'Courier New',monospace; font-size:13px;
    min-height:60px; max-height:160px; overflow-y:auto; overflow-x:hidden;
    white-space:pre-wrap; word-break:break-word; line-height:1.65; border-radius:3px;
  }
  #path-out  { color:#5bc0de; }
  #morph-out { color:#7ec77e; }
  .flash { color:#4c4; font-size:11px; display:none; margin-left:4px; }
</style>
</head>
<body>
<h2>DUCTUS PAINT v2.3</h2>
<canvas id="c" width="520" height="520"></canvas>

<div class="row">
  <button onclick="undoLast()">↩ undo</button>
  <button onclick="clearAll()">✕ clear</button>
  <span id="ok" class="flash">✓</span>
</div>

<div id="status">
  <div class="mdot" id="mdot"></div>
  <span id="status-txt" style="color:#444">disegna una gallows...</span>
</div>

<div id="gid-box">
  <span id="gid-label">TOKEN</span>
  <span id="gid-token">—</span>
  <span id="gid-detail">nessun tracciato</span>
</div>

<div class="panels">
  <div class="panel">
    <div class="plabel-row">
      <span class="plabel">Percorso</span>
      <button class="sm" onclick="copyPanel('path-out')">copia</button>
    </div>
    <div class="out" id="path-out">--</div>
  </div>
  <div class="panel">
    <div class="plabel-row">
      <span class="plabel">Morfemi</span>
      <button class="sm" onclick="copyPanel('morph-out')">copia</button>
    </div>
    <div class="out" id="morph-out">--</div>
  </div>
</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const SZ = 520, PAD = 105, SP = 155;
const FF = "'Helvetica Neue',Helvetica,Arial,sans-serif";

// Minimum segment length (in grid units) to show semantic annotations.
// Short micro-movements inside curls are suppressed — the curl is read as
// a whole CW/CCW unit via the winding number, not decomposed into segments.
const SEG_MIN_SEMANTIC = 0.35;

// ── NODES ──────────────────────────────────────
// Cardinal labels = solvent codes: K=acqua(N), L=alcool(E), T=olio(S), S=aceto(W).
// C center node has no label (dark circle only).
const NODES = [
  {id:'NW', col:0, row:0, fill:null},
  {id:'N',  col:1, row:0, fill:'#4fc3f7', label:'K'},
  {id:'NE', col:2, row:0, fill:null},
  {id:'W',  col:0, row:1, fill:'#e8c84a', label:'S'},
  {id:'C',  col:1, row:1, fill:'#2a2a2a', label:''},
  {id:'E',  col:2, row:1, fill:'#e94560', label:'L'},
  {id:'SW', col:0, row:2, fill:null},
  {id:'S',  col:1, row:2, fill:'#66bb6a', label:'T'},
  {id:'SE', col:2, row:2, fill:null},
];

// ── GALLOWS ────────────────────────────────────
const GALLOWS = [
  {name:'K', eva:'k', corner:'NE', gx:2, gy:2,
   cw_gloss:'decozione',           ccw_gloss:'K inverso',            color:'#e94560'},
  {name:'F', eva:'f', corner:'NW', gx:0, gy:2,
   cw_gloss:'macerazione fredda',  ccw_gloss:'F inverso',            color:'#4fc3f7'},
  {name:'T', eva:'t', corner:'SE', gx:2, gy:0,
   cw_gloss:'infusione oleosa',    ccw_gloss:'T inverso',            color:'#ff9800'},
  {name:'P', eva:'p', corner:'SW', gx:0, gy:0,
   cw_gloss:'pressatura',          ccw_gloss:'P inverso',            color:'#ab47bc'},
];

// ── DIRECTIONAL SEMANTICS ──────────────────────
// These annotations appear ONLY for strokes >= SEG_MIN_SEMANTIC.
// Short micro-movements inside a ricciolo are read as CW/CCW via winding — not decomposed.
const DIR_SEM = {
  'E':  {sym:'\u2192', label:'scalda (ch)',              color:'#ff7043'},
  'W':  {sym:'\u2190', label:'raffredda (sh)',           color:'#4fc3f7'},
  'N':  {sym:'\u2191', label:'diluisci (q)',             color:'#80deea'},
  'S':  {sym:'\u2193', label:'concentra',               color:'#ce93d8'},
  'NE': {sym:'\u2197', label:'scalda + diluisci',        color:'#ffb74d'},
  'NW': {sym:'\u2196', label:'raffredda + diluisci',     color:'#80cbc4'},
  'SE': {sym:'\u2198', label:'scalda + concentra',       color:'#ff8a65'},
  'SW': {sym:'\u2199', label:'raffredda + concentra',    color:'#ba68c8'},
};

// ── DUCTUS LIBRARY ─────────────────────────────
// Reference patterns for gallows forms.
// corner: node where the loop is located.
// cw: true = canonical direction (clockwise in canvas = visually CW).
// func: procedural meaning from morphological analysis.
// expected / reversed: human-readable notation for the Coda table.
const DUCTUS_LIBRARY = {
  // ── BASE FOUR ──────────────────────────────
  'k': {
    eva:'k', name:'K', corner:'NE', cw:true,
    func:'Decozione \u2014 acqua+calore (NE). Apertura ricetta estrazione acquosa vigorosa.',
    expected:'\u2193S \u00b7 \u21bbNE',
    reversed:'\u2193S \u00b7 \u21baNA',
  },
  't': {
    eva:'t', name:'T', corner:'SE', cw:true,
    func:'Infusione oleosa \u2014 olio+calore (SE). Estrazione prolungata in olio caldo.',
    expected:'\u2193S \u00b7 \u21bbSE',
    reversed:'\u2193S \u00b7 \u21baSE',
  },
  'p': {
    eva:'p', name:'P', corner:'SW', cw:true,
    func:'Pressatura \u2014 SW (aceto+olio). Prima estrazione meccanica a freddo.',
    expected:'\u2193S \u00b7 \u21bbSW',
    reversed:'\u2193S \u00b7 \u21baSW',
  },
  'f': {
    eva:'f', name:'F', corner:'NW', cw:true,
    func:'Macerazione a freddo \u2014 NW (freddo+acqua). Immersione lenta in solvente freddo.',
    expected:'\u2193S \u00b7 \u21bbNW',
    reversed:'\u2193S \u00b7 \u21baNW',
  },
  // ── ORNATE (bench + gallows) ───────────────
  // The bench char 'c' adds a left horizontal stroke before the ascender.
  'ckh': {
    eva:'ckh', name:'CKH', corner:'NE', cw:true,
    func:'Decozione intensa \u2014 ch amplifica il calore NE. Estrazione acquosa con pre-riscaldo.',
    expected:'\u2190W \u00b7 \u2193S \u00b7 \u21bbNE',
    reversed:'\u2190W \u00b7 \u2193S \u00b7 \u21baNE',
  },
  'cth': {
    eva:'cth', name:'CTH', corner:'SE', cw:true,
    func:'Infusione oleosa intensa \u2014 ch+olio (SE). Estrazione prolungata ad alta temperatura.',
    expected:'\u2190W \u00b7 \u2193S \u00b7 \u21bbSE',
    reversed:'\u2190W \u00b7 \u2193S \u00b7 \u21baSE',
  },
  'cph': {
    eva:'cph', name:'CPH', corner:'SW', cw:true,
    func:'Pressatura intensa \u2014 ch+SW. Estrazione multipla con aggiunta di calore.',
    expected:'\u2190W \u00b7 \u2193S \u00b7 \u21bbSW',
    reversed:'\u2190W \u00b7 \u2193S \u00b7 \u21baSW',
  },
  'cfh': {
    eva:'cfh', name:'CFH', corner:'NW', cw:true,
    func:'Digestio (F-ch) \u2014 macerazione a caldo. Inversione termica su base F (NW+ch).',
    expected:'\u2190W \u00b7 \u2193S \u00b7 \u21bbNW',
    reversed:'\u2190W \u00b7 \u2193S \u00b7 \u21baNW',
  },
};

// ── LIBRARY MATCH ─────────────────────────────
// Returns {match: 'direct'|'reversed'|'none', entry}
function getLibraryMatch(res) {
  if (!res.length) return {match:'none', entry:null};
  const {corner, cw} = res[0];
  const entries = Object.values(DUCTUS_LIBRARY).filter(e => e.corner === corner);
  if (!entries.length) return {match:'none', entry:null};
  const direct   = entries.find(e => e.cw === cw);
  if (direct)   return {match:'direct',   entry:direct};
  const reversed = entries.find(e => e.cw !== cw);
  if (reversed) return {match:'reversed', entry:reversed};
  return {match:'none', entry:null};
}

// ── COORDINATE UTILS ───────────────────────────
function tc(gx, gy) { return {x: PAD + gx*SP, y: PAD + (2-gy)*SP}; }
function cp(col, row){ return {x: PAD + col*SP, y: PAD + row*SP}; }

// ── MATH ───────────────────────────────────────
function gauss(pts, s) {
  const r=Math.ceil(s*2.5), kl=2*r+1, k=[]; let ks=0;
  for(let i=0;i<kl;i++){const w=Math.exp(-((i-r)**2)/(2*s*s));k.push(w);ks+=w;}
  k.forEach((v,i)=>k[i]=v/ks);
  return pts.map((_,i)=>{
    let sx=0,sy=0;
    for(let j=0;j<kl;j++){const idx=Math.max(0,Math.min(pts.length-1,i-r+j));sx+=pts[idx].x*k[j];sy+=pts[idx].y*k[j];}
    return{x:sx,y:sy};
  });
}
function rdp(pts, eps) {
  if(pts.length<=2) return pts;
  let mx=0,mi=0; const[a,b]=[pts[0],pts[pts.length-1]];
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
  for(let i=1;i<pts.length-1;i++){const d=Math.abs(dy*pts[i].x-dx*pts[i].y+b.x*a.y-b.y*a.x)/len;if(d>mx){mx=d;mi=i;}}
  if(mx>eps) return[...rdp(pts.slice(0,mi+1),eps).slice(0,-1),...rdp(pts.slice(mi),eps)];
  return[a,b];
}
// SIGNED winding number (positive = CW in canvas = visually CW on screen)
function winding(pts, ox, oy) {
  let w=0;
  for(let i=0;i<pts.length-1;i++){
    const ax=pts[i].x-ox,ay=pts[i].y-oy,bx=pts[i+1].x-ox,by=pts[i+1].y-oy;
    w+=Math.atan2(ax*by-ay*bx,ax*bx+ay*by);
  }
  return w;
}

// ── DIRECTION QUANTIZATION ─────────────────────
function quantDir(dx, dy) {
  const angle = Math.atan2(-dy, dx) * 180/Math.PI;
  const norm  = ((angle % 360) + 360) % 360;
  const cardinals = [{a:0,d:'E'},{a:90,d:'N'},{a:180,d:'W'},{a:270,d:'S'}];
  for(const c of cardinals){
    const diff = Math.abs(((norm - c.a + 180) % 360) - 180);
    if(diff <= 30) return c.d;
  }
  const diags = [{a:45,d:'NE'},{a:135,d:'NW'},{a:225,d:'SW'},{a:315,d:'SE'}];
  let best=diags[0], bd=999;
  for(const d of diags){
    const diff=Math.abs(((norm-d.a+180)%360)-180);
    if(diff<bd){bd=diff;best=d;}
  }
  return best.d;
}

function buildSegments(strokes) {
  const all=strokes.flat(); if(all.length<2) return [];
  const cpts=all.map(p=>tc(p.x,p.y));
  const raw=[];
  let dir=null, segStart=cpts[0], segLen=0;
  for(let i=1;i<cpts.length;i++){
    const dx=cpts[i].x-cpts[i-1].x, dy=cpts[i].y-cpts[i-1].y;
    const d=Math.hypot(dx,dy); if(d<0.5) continue;
    const nd=quantDir(dx,dy);
    segLen+=d;
    if(nd!==dir){
      if(dir!==null) raw.push({dir,len:segLen/SP,from:segStart,to:cpts[i-1]});
      dir=nd; segStart=cpts[i-1]; segLen=d;
    }
  }
  if(dir) raw.push({dir,len:segLen/SP,from:segStart,to:cpts[cpts.length-1]});
  const out=[];
  raw.forEach(s=>{
    if(out.length&&out[out.length-1].dir===s.dir){
      out[out.length-1].len+=s.len;
      out[out.length-1].to=s.to;
    } else out.push({...s});
  });
  return out;
}

// ── CLASSIFICATION ─────────────────────────────
function classify(strokes) {
  const pts=strokes.flat(); if(pts.length<4) return [];
  const cpts=pts.map(p=>tc(p.x,p.y));
  const sc=GALLOWS.map(g=>{
    const c=tc(g.gx,g.gy);
    const w=winding(cpts,c.x,c.y);
    return{...g, w, absW:Math.abs(w)};
  }).filter(g=>g.absW>Math.PI*0.4).sort((a,b)=>b.absW-a.absW);
  if(!sc.length) return [];
  const top=sc[0].absW;
  return sc.map(g=>({...g, conf:g.absW/top, cw:g.w>0}));
}

// ── STATE ──────────────────────────────────────
let strokes=[], curRaw=[], drawing=false, emaX=0, emaY=0;
const EMA=0.22;

let cwBase={NE:0,NW:0,SE:0,SW:0};
let cwAcc ={NE:0,NW:0,SE:0,SW:0};
let prevPt=null;

function recomputeBase(){
  cwBase={NE:0,NW:0,SE:0,SW:0};
  if(!strokes.length) return;
  const pts=strokes.flat().map(p=>tc(p.x,p.y));
  GALLOWS.forEach(g=>{const c=tc(g.gx,g.gy);cwBase[g.corner]=winding(pts,c.x,c.y);});
}
function totalW(corner){ return cwBase[corner]+cwAcc[corner]; }
function ingestPt(pt){
  if(!prevPt){prevPt=pt;return;}
  GALLOWS.forEach(g=>{
    const c=tc(g.gx,g.gy);
    const ax=prevPt.x-c.x,ay=prevPt.y-c.y,bx=pt.x-c.x,by=pt.y-c.y;
    cwAcc[g.corner]+=Math.atan2(ax*by-ay*bx,ax*bx+ay*by);
  });
  prevPt=pt;
}

// ── CURL ARROW ─────────────────────────────────
// Rotated ~180 deg from v2.2: starts at 6 o'clock (PI/2) instead of 12 o'clock.
// 270 deg sweep covers the 2 outer arcs of the circumference.
// CW:  6->9->12->3 o'clock  (covers left+top+right, opens at bottom-right)
// CCW: 6->3->12->9 o'clock  (covers right+top+left, opens at bottom-left)
function drawCurlArrow(px, py, r, cw, color) {
  const startAngle = Math.PI / 2;
  const sweep      = Math.PI * 1.5;
  const endAngle   = cw ? startAngle + sweep : startAngle - sweep;

  cx.save();
  cx.strokeStyle = color;
  cx.lineWidth   = 3.5;
  cx.lineCap     = 'round';

  cx.beginPath();
  cx.arc(px, py, r, startAngle, endAngle, !cw);
  cx.stroke();

  const ex = px + r * Math.cos(endAngle);
  const ey = py + r * Math.sin(endAngle);
  const tang = cw ? endAngle + Math.PI/2 : endAngle - Math.PI/2;
  const as   = 12;

  cx.fillStyle = color;
  cx.beginPath();
  cx.moveTo(ex, ey);
  cx.lineTo(ex + as*Math.cos(tang - 0.5), ey + as*Math.sin(tang - 0.5));
  cx.lineTo(ex + as*Math.cos(tang + 0.5), ey + as*Math.sin(tang + 0.5));
  cx.closePath();
  cx.fill();
  cx.restore();
}

// ── DRAW CORNER NODE ───────────────────────────
function drawCorner(px, py, id) {
  const w    = totalW(id);
  const absW = Math.abs(w);

  if(absW > Math.PI * 0.5) {
    const cw = w > 0;
    const col = cw ? '#ff9944' : '#44aaff';
    cx.beginPath();cx.arc(px,py,28,0,Math.PI*2);
    cx.strokeStyle=col+'44';cx.lineWidth=2;cx.stroke();
    drawCurlArrow(px, py, 21, cw, col);
    cx.save();
    cx.font='bold 10px '+FF;
    cx.fillStyle=col+'cc';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(cw?'\u21bb':'\u21ba', cw ? px+24 : px-24, py+14);
    cx.restore();
  } else {
    cx.beginPath();cx.arc(px,py,15,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.06)';cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.25)';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(px,py,3,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.28)';cx.fill();
    cx.fillStyle='rgba(255,255,255,0.16)';
    cx.font='8px '+FF;cx.textAlign='center';cx.textBaseline='middle';
    const off=id.includes('N')?-26:26;
    cx.fillText(id, px, py+off);
  }
}

// ── RENDER ─────────────────────────────────────
function render() {
  cx.clearRect(0,0,SZ,SZ);
  cx.fillStyle='#111';cx.fillRect(0,0,SZ,SZ);

  cx.lineWidth=1;cx.setLineDash([]);
  cx.strokeStyle='#191919';
  for(let i=0;i<=2;i++){
    cx.beginPath();cx.moveTo(PAD+i*SP,PAD-40);cx.lineTo(PAD+i*SP,PAD+2*SP+40);cx.stroke();
    cx.beginPath();cx.moveTo(PAD-40,PAD+i*SP);cx.lineTo(PAD+2*SP+40,PAD+i*SP);cx.stroke();
  }
  cx.strokeStyle='#151515';cx.setLineDash([2,8]);
  for(let i=0;i<2;i++){
    const m=PAD+i*SP+SP/2;
    cx.beginPath();cx.moveTo(m,PAD-40);cx.lineTo(m,PAD+2*SP+40);cx.stroke();
    cx.beginPath();cx.moveTo(PAD-40,m);cx.lineTo(PAD+2*SP+40,m);cx.stroke();
  }
  cx.setLineDash([]);
  cx.lineCap='round';cx.lineJoin='round';

  strokes.forEach(s=>{
    if(s.length<2) return;
    const pts=s.map(p=>tc(p.x,p.y));
    cx.beginPath();cx.moveTo(pts[0].x,pts[0].y);
    pts.forEach(p=>cx.lineTo(p.x,p.y));
    cx.strokeStyle='rgba(233,69,96,0.15)';cx.lineWidth=1.5;cx.stroke();
  });

  if(strokes.length){
    buildSegments(strokes).forEach(seg=>{
      const sem=DIR_SEM[seg.dir];
      const isSemantic = seg.len >= SEG_MIN_SEMANTIC;
      const col = isSemantic ? sem.color : '#333';

      cx.beginPath();cx.moveTo(seg.from.x,seg.from.y);cx.lineTo(seg.to.x,seg.to.y);
      cx.strokeStyle=col;cx.lineWidth= isSemantic ? 2.5 : 1.2;cx.stroke();

      if(isSemantic){
        const mx=(seg.from.x+seg.to.x)/2, my=(seg.from.y+seg.to.y)/2;
        const ang=Math.atan2(seg.to.y-seg.from.y,seg.to.x-seg.from.x);
        cx.save();cx.translate(mx,my);cx.rotate(ang);
        cx.beginPath();cx.moveTo(7,0);cx.lineTo(-5,-4);cx.lineTo(-5,4);cx.closePath();
        cx.fillStyle=col;cx.fill();cx.restore();

        const perp=ang-Math.PI/2;
        cx.save();
        cx.font='bold 10px '+FF;
        cx.fillStyle=col+'bb';
        cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(sem.sym, mx+14*Math.cos(perp), my+14*Math.sin(perp));
        cx.restore();
      }
    });
  }

  if(curRaw.length>1){
    cx.beginPath();cx.moveTo(curRaw[0].x,curRaw[0].y);
    curRaw.forEach(p=>cx.lineTo(p.x,p.y));
    cx.strokeStyle='rgba(233,69,96,0.35)';cx.lineWidth=2;cx.stroke();
  }

  NODES.forEach(n=>{
    const p=cp(n.col,n.row);
    if(!n.fill){
      drawCorner(p.x,p.y,n.id);
    } else {
      cx.beginPath();cx.arc(p.x,p.y,15,0,Math.PI*2);
      cx.fillStyle=n.fill;cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.35)';cx.lineWidth=1.5;cx.stroke();
      if(n.label){
        cx.fillStyle='rgba(0,0,0,0.8)';
        cx.font='bold 9px '+FF;cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(n.label,p.x,p.y);
      }
    }
  });
}

// ── UI UPDATES ─────────────────────────────────
function updateStatus(){
  const dot=document.getElementById('mdot'), txt=document.getElementById('status-txt');
  if(!strokes.length){
    dot.className='mdot';
    txt.innerHTML='<span style="color:#444">disegna una gallows...</span>';
    return;
  }
  const res=classify(strokes);
  if(!res.length){
    dot.className='mdot red';
    txt.innerHTML='<span style="color:#ee3333;font-weight:700;letter-spacing:2px;font-size:14px">NO MATCH</span>';
    return;
  }

  const lm = getLibraryMatch(res);
  const t  = res[0];

  if(lm.match === 'direct'){
    dot.className='mdot green';
    const dirArrow = t.cw ? '\u21bb' : '\u21ba';
    const gloss    = t.cw ? t.cw_gloss : '<span style="color:#888;font-style:italic">'+t.ccw_gloss+'</span>';
    let h='<span style="font-weight:700;font-size:16px;color:'+t.color+'">'+t.name+'</span>'
        +' <span style="color:'+t.color+'cc">'+dirArrow+'</span>'
        +' <span style="color:#777">'+gloss+'</span>'
        +' <span style="color:#555;font-size:11px">'+Math.round(t.conf*100)+'%</span>';
    if(res.length>1&&res[1].conf>0.5)
      h+=' <span style="color:#444;font-size:11px">/ '+res[1].name+' '+Math.round(res[1].conf*100)+'%</span>';
    txt.innerHTML=h;

  } else if(lm.match === 'reversed'){
    dot.className='mdot orange';
    const entry = lm.entry;
    txt.innerHTML=
      '<span style="color:#ff9800;font-weight:700;font-size:14px">\u26a0 DUCTUS INVERTITO</span>'
      +' <span style="color:#888;font-size:12px">\u2014 prova a disegnare <span style="color:'+t.color+';font-weight:700">'+entry.eva+'</span> al contrario</span>';

  } else {
    dot.className='mdot red';
    txt.innerHTML='<span style="color:#ee3333;font-weight:700;letter-spacing:2px;font-size:14px">NO MATCH</span>';
  }
}

function updateGidBox(){
  const tok=document.getElementById('gid-token');
  const det=document.getElementById('gid-detail');
  if(!strokes.length){
    tok.textContent='\u2014'; tok.style.color='#2a2a2a';
    det.innerHTML='nessun tracciato'; det.style.color='#444';
    return;
  }
  const res=classify(strokes);
  if(!res.length){
    tok.textContent='?'; tok.style.color='#553333';
    det.innerHTML='forma non riconosciuta'; det.style.color='#553333';
    return;
  }

  const t   = res[0];
  const lm  = getLibraryMatch(res);
  const dir = t.cw ? '\u21bb CW' : '\u21ba CCW';

  tok.textContent = t.eva;
  tok.style.color = t.color;

  let matchBadge = '';
  if(lm.match === 'direct'){
    matchBadge = ' &nbsp;<span style="color:#44cc44;font-size:11px;font-weight:700">\u2713 match</span>';
  } else if(lm.match === 'reversed'){
    matchBadge = ' &nbsp;<span style="color:#ff9800;font-size:11px;font-weight:700">\u26a0 invertito</span>';
    tok.textContent = lm.entry.eva + '?';
  }

  const line1 =
    '<span style="color:'+t.color+';font-weight:700">'+t.name+'</span>'
    + ' &nbsp;\u00b7&nbsp; corner '+ t.corner
    + ' &nbsp;\u00b7&nbsp; <span style="color:'+t.color+'aa">'+dir+'</span>'
    + matchBadge;

  let line2 = '';
  if(lm.entry){
    line2 = '<span style="color:#555;font-size:11px">'+lm.entry.func+'</span>';
  } else {
    const gloss = t.cw ? t.cw_gloss : t.ccw_gloss;
    line2 = '<span style="color:#444;font-size:11px">'+gloss+'</span>';
  }

  det.innerHTML = line1 + '<br>' + line2;
  det.style.color = '';
}

function updatePanels(){
  const po=document.getElementById('path-out'), mo=document.getElementById('morph-out');
  if(!strokes.length){po.textContent='--';mo.textContent='--';return;}
  const allSegs=buildSegments(strokes);
  if(!allSegs.length){po.textContent='--';mo.textContent='--';return;}

  const segs = allSegs.filter(s => s.len >= SEG_MIN_SEMANTIC);

  if(segs.length){
    po.textContent=segs.map(s=>{
      return DIR_SEM[s.dir].sym+' '+s.dir+' '+s.len.toFixed(2)+'u';
    }).join('\n');
  } else {
    po.textContent='(solo ricciolo)';
  }

  const lines=[];
  if(segs.length){
    lines.push('PATH: '+segs.map(s=>DIR_SEM[s.dir].sym).join(''));
    const dmap={};
    segs.forEach(s=>{if(!dmap[s.dir])dmap[s.dir]=0;dmap[s.dir]+=s.len;});
    const mvParts=Object.entries(dmap).map(([d])=>DIR_SEM[d].label).filter(Boolean);
    if(mvParts.length) lines.push('MOV: '+mvParts.join(' | '));
  }

  const curlParts=[];
  GALLOWS.forEach(g=>{
    const w=cwBase[g.corner];
    if(Math.abs(w)>Math.PI*0.5){
      const cw=w>0;
      const gl=cw?g.cw_gloss:g.ccw_gloss;
      curlParts.push(g.corner+':'+(cw?'\u21bb':'\u21ba')+' '+gl);
    }
  });
  if(curlParts.length) lines.push('RICCIOLI: '+curlParts.join(' | '));

  const res=classify(strokes);
  const lm=getLibraryMatch(res);
  if(lm.entry){
    const notation = lm.match==='reversed' ? lm.entry.reversed : lm.entry.expected;
    lines.push('ATTESO: '+notation);
  }

  mo.textContent=lines.join('\n') || '--';
}

function updateAll(){ updateStatus(); updateGidBox(); updatePanels(); }

// ── INPUT ──────────────────────────────────────
function gp(e){
  const r=cv.getBoundingClientRect(), sc=SZ/r.width;
  const s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*sc,y:(s.clientY-r.top)*sc};
}
function startStroke(e){
  drawing=true; const p=gp(e); emaX=p.x; emaY=p.y;
  curRaw=[{x:emaX,y:emaY}];
  cwAcc={NE:0,NW:0,SE:0,SW:0}; prevPt={x:emaX,y:emaY};
}
function moveStroke(e){
  if(!drawing) return; const p=gp(e);
  emaX=EMA*p.x+(1-EMA)*emaX; emaY=EMA*p.y+(1-EMA)*emaY;
  const last=curRaw[curRaw.length-1];
  if((emaX-last.x)**2+(emaY-last.y)**2>4){
    const pt={x:emaX,y:emaY}; curRaw.push(pt); ingestPt(pt); render();
  }
}
function endStroke(){
  if(!drawing||curRaw.length<4){drawing=false;curRaw=[];return;}
  drawing=false;
  const si=rdp(gauss(curRaw,10),9);
  strokes.push(si.map(p=>({
    x:Math.round(((p.x-PAD)/SP)*100)/100,
    y:Math.round((2-(p.y-PAD)/SP)*100)/100
  })));
  curRaw=[]; prevPt=null;
  recomputeBase(); cwAcc={NE:0,NW:0,SE:0,SW:0};
  updateAll(); render();
}

cv.addEventListener('mousedown', e=>{startStroke(e);});
cv.addEventListener('mousemove', e=>{moveStroke(e);});
cv.addEventListener('mouseup',   endStroke);
cv.addEventListener('mouseleave',endStroke);
cv.addEventListener('touchstart',e=>{e.preventDefault();startStroke(e);},{passive:false});
cv.addEventListener('touchmove', e=>{e.preventDefault();moveStroke(e);}, {passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();endStroke();},   {passive:false});

// ── ACTIONS ────────────────────────────────────
function clearAll(){
  strokes=[];curRaw=[];drawing=false;
  cwBase={NE:0,NW:0,SE:0,SW:0};cwAcc={NE:0,NW:0,SE:0,SW:0};prevPt=null;
  updateAll();render();
}
function undoLast(){
  if(strokes.length){strokes.pop();recomputeBase();updateAll();render();}
}
function flash(){
  const el=document.getElementById('ok');el.style.display='inline';
  setTimeout(()=>el.style.display='none',1400);
}
function copyPanel(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(flash).catch(()=>{});
}

render();
</script>
